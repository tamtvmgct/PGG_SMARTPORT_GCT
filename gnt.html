<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GNT — Terminal Yard Operations</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-base:      #0a1628;
            --bg-surface:   #0d1e35;
            --bg-card:      #111f38;
            --bg-deep:      #050d1a;
            --border-dim:   rgba(59,130,246,0.15);
            --border-glow:  rgba(59,130,246,0.4);
            --text-primary: #e2eaf8;
            --text-muted:   #7a91b5;
            --text-dim:     #3d5278;
            --blue-vivid:   #3b82f6;
            --green-vivid:  #22c55e;
            --red-vivid:    #ef4444;
            --orange-vivid: #f97316;
            --font-tech:    'Rajdhani', sans-serif;
            --font-body:    'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg-base); color: var(--text-primary); 
            font-family: var(--font-body); display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* ===== LOGIN OVERLAY ===== */
        #loginOverlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(5,13,26,0.9); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            width: 320px; background: var(--bg-surface);
            border: 1px solid var(--orange-vivid); border-radius: 16px;
            padding: 30px; display: flex; flex-direction: column; gap: 16px;
            box-shadow: 0 0 40px rgba(249,115,22,0.15);
        }
        .sys-input, .sys-btn {
            width: 100%; padding: 12px; border-radius: 8px; outline: none;
            font-family: var(--font-tech); font-size: 15px; font-weight: 700;
        }
        .sys-input { background: var(--bg-deep); border: 1px solid var(--border-dim); color: white; }
        .sys-btn { background: var(--orange-vivid); color: white; border: none; cursor: pointer; text-transform: uppercase; }

        /* ===== HEADER ===== */
        header {
            padding: 12px 20px; background: var(--bg-deep);
            border-bottom: 1px solid var(--border-dim);
            display: flex; align-items: center; justify-content: space-between;
        }
        .brand { display: flex; align-items: center; gap: 12px; }
        .title-sub { font-size: 10px; font-weight: 600; color: var(--orange-vivid); letter-spacing: 0.1em; text-transform: uppercase; }
        .title-main { font-family: var(--font-tech); font-size: 18px; font-weight: 700; color: white; }

        .ws-status {
            padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; font-family: var(--font-tech);
            border: 1px solid rgba(239,68,68,0.3); color: var(--red-vivid);
        }
        .ws-status.active { border-color: rgba(34,197,94,0.3); color: var(--green-vivid); }

        /* ===== MAIN LAYOUT ===== */
        .gnt-main { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }

        /* LEFT: ACTIVE TASK */
        .panel-task {
            width: 380px; background: var(--bg-surface); border: 1px solid var(--border-dim);
            border-radius: 12px; display: flex; flex-direction: column;
        }
        .panel-header {
            padding: 12px 16px; background: rgba(5,13,26,0.5); border-bottom: 1px solid var(--border-dim);
            font-family: var(--font-tech); font-size: 13px; font-weight: 700;
            color: var(--blue-vivid); text-transform: uppercase; letter-spacing: 0.1em;
        }
        
        .empty-task {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-dim); gap: 10px;
        }
        
        .active-task-body { display: none; padding: 16px; flex: 1; overflow-y: auto; }
        .data-card {
            background: var(--bg-deep); border: 1px solid var(--border-dim);
            border-radius: 10px; padding: 14px; margin-bottom: 12px;
        }
        .data-lbl { font-size: 9px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }
        .data-val { font-family: var(--font-tech); font-size: 20px; font-weight: 700; color: white; margin-top: 2px; }
        
        .loc-target {
            background: rgba(37,99,235,0.1); border: 1px dashed var(--blue-vivid);
            padding: 16px; border-radius: 10px; text-align: center; margin-top: 20px;
        }
        .loc-target .lbl { font-size: 11px; color: var(--blue-vivid); font-weight: 600; text-transform: uppercase; margin-bottom: 6px; }
        .loc-target .val { font-family: var(--font-tech); font-size: 32px; font-weight: 700; color: white; }

        .btn-action {
            width: 100%; padding: 16px; border: none; border-radius: 10px; margin-top: 10px;
            font-family: var(--font-tech); font-size: 15px; font-weight: 700; text-transform: uppercase;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-confirm { background: linear-gradient(135deg, #15803d, #22c55e); color: white; }
        .btn-confirm:hover { box-shadow: 0 0 15px rgba(34,197,94,0.4); }
        .btn-report { background: rgba(239,68,68,0.1); color: var(--red-vivid); border: 1px solid rgba(239,68,68,0.3); margin-top: 10px; }

        /* RIGHT: YARD MAP */
        .panel-map {
            flex: 1; background: var(--bg-surface); border: 1px solid var(--border-dim);
            border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; position: relative;
        }
        .map-header { display: flex; padding: 12px 16px; background: rgba(5,13,26,0.5); gap: 10px; border-bottom: 1px solid var(--border-dim); z-index: 10;}
        .block-tab {
            padding: 8px 16px; border-radius: 8px; font-family: var(--font-tech); font-size: 14px; font-weight: 700;
            background: var(--bg-deep); border: 1px solid var(--border-dim); color: var(--text-muted); cursor: pointer;
        }
        .block-tab.active { background: var(--blue-vivid); color: white; border-color: var(--blue-vivid); }

        .map-wrapper { flex: 1; overflow: hidden; position: relative; }
        .map-container { 
            width: 100%; height: 100%; overflow: auto; padding: 20px; background: var(--bg-deep); 
            cursor: grab;
        }
        .map-container:active { cursor: grabbing; }
        .bay-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px;
            transform-origin: top left;
            transition: transform 0.15s ease-out;
            min-width: 1000px; padding-bottom: 40px;
        }
        .bay-card {
            background: var(--bg-card); border: 1px solid var(--border-dim); border-radius: 12px; padding: 16px;
            min-height: 140px;
        }
        .bay-card.target { border-color: var(--orange-vivid); box-shadow: 0 0 25px rgba(249,115,22,0.4); border-width: 2px;}
        .bay-title {
            font-family: var(--font-tech); font-size: 16px; font-weight: 700; color: var(--blue-vivid);
            display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-dim); padding-bottom: 8px; margin-bottom: 12px;
        }
        .tier-grid { display: grid; gap: 4px; }
        .tier-row { display: flex; gap: 4px; height: 18px; }
        .tier-cell {
            flex: 1; border: 1px solid rgba(255,255,255,0.05); border-radius: 4px; background: rgba(255,255,255,0.02);
            transition: all 0.2s;
        }
        .tier-cell.filled { background: var(--blue-vivid); border-color: var(--blue-bright); box-shadow: 0 0 5px rgba(59,130,246,0.3);}
        .tier-cell.target { background: var(--orange-vivid); animation: blink 1s infinite; border-color: #fff;}
        
        .zoom-controls {
            position: absolute; bottom: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 12px; z-index: 100;
        }
        .btn-zoom {
            width: 50px; height: 50px; border-radius: 25px;
            background: var(--bg-surface); border: 2px solid var(--border-dim);
            color: white; font-size: 24px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .btn-zoom:hover { background: var(--blue-vivid); border-color: var(--blue-vivid); }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    </style>
</head>
<body>

    <!-- ===== LOGIN ===== -->
    <div id="loginOverlay">
        <div class="login-card">
            <div style="text-align:center;">
                <i class="fas fa-forklift" style="font-size:36px;color:var(--orange-vivid);margin-bottom:10px;"></i>
                <div style="font-family:var(--font-tech);font-size:20px;font-weight:700;color:white;letter-spacing:0.1em;">GNT LOGIN</div>
                <div style="font-size:10px;color:var(--text-muted);">Terminal Operations</div>
            </div>
            <input type="text" id="username" class="sys-input" placeholder="User (vd: gnt)" value="gnt">
            <input type="password" id="password" class="sys-input" placeholder="Password" value="gnt123">
            <button class="sys-btn" onclick="login()">Đăng nhập Xe Nâng</button>
        </div>
    </div>

    <!-- ===== HEADER ===== -->
    <header>
        <div class="brand">
            <i class="fas fa-forklift" style="font-size:24px;color:var(--orange-vivid);"></i>
            <div>
                <div class="title-sub">Thiết bị: RTG-04</div>
                <div class="title-main">GNT Hub</div>
            </div>
        </div>
        <div class="ws-status" id="wsStatus">DISCONNECTED</div>
    </header>

    <!-- ===== MAIN ===== -->
    <div class="gnt-main">
        <!-- LEFT PANEL: TASK -->
        <div class="panel-task">
            <div class="panel-header">Lệnh Điều Hành Hiện Tại</div>
            
            <div class="empty-task" id="emptyTask">
                <i class="fas fa-mug-hot" style="font-size:32px;opacity:0.5;"></i>
                <div style="font-family:var(--font-tech);font-size:14px;letter-spacing:0.05em;font-weight:600;">Đang chờ lệnh từ PIMS...</div>
            </div>

            <div class="active-task-body" id="activeTask">
                <div class="data-card">
                    <div class="data-lbl">Biển số xe kéo</div>
                    <div class="data-val" style="color:var(--orange-vivid);" id="tPlate">51H-123.45</div>
                </div>
                <div class="data-card">
                    <div class="data-lbl">Số Container</div>
                    <div class="data-val" id="tContainer">NYKU4801820</div>
                    <div style="font-size:11px;color:var(--text-muted);margin-top:4px;" id="tSize">40GP | FULL | Xuất đi: USCH5</div>
                </div>
                
                <div class="loc-target">
                    <div class="lbl">Tọa độ Hạ Hàng (Target)</div>
                    <div class="val" id="tLocation">A-26-01-04</div>
                </div>

                <div style="margin-top:20px;">
                    <button class="btn-action btn-confirm" onclick="confirmTask()">
                        <i class="fas fa-check-circle" style="margin-right:8px;"></i> BÁO CÁO HOÀN TẤT
                    </button>
                    <button class="btn-action btn-report" onclick="reportFull()">
                        <i class="fas fa-exclamation-triangle" style="margin-right:8px;"></i> BÁO CÁO KHU VỰC ĐẦY
                    </button>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL: YARD MAP -->
        <div class="panel-map">
            <div class="map-header" id="blockTabs">
                <button class="block-tab active" onclick="loadBlock('A')">Block A (Xuất)</button>
                <button class="block-tab" onclick="loadBlock('B')">Block B (Nhập)</button>
                <button class="block-tab" onclick="loadBlock('C')">Block C (Rỗng)</button>
            </div>
            <div class="map-wrapper">
                <div class="zoom-controls">
                    <button class="btn-zoom" onclick="zoomMap(0.2)"><i class="fas fa-plus"></i></button>
                    <button class="btn-zoom" onclick="zoomMap(-0.2)"><i class="fas fa-minus"></i></button>
                    <button class="btn-zoom" onclick="resetZoom()"><i class="fas fa-compress-arrows-alt"></i></button>
                </div>
                <div class="map-container" id="mapContainer">
                    <div class="bay-grid" id="bayGrid">
                        <!-- Balo renders here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:3000/api";
        const WS_URL   = "ws://localhost:3000";
        
        const $ = id => document.getElementById(id);
        
        let token = "";
        let ws = null;
        let currentJob = null;
        let yardData = {};

        async function login() {
            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: $('username').value, password: $('password').value })
                });
                const data = await res.json();
                if (data.ok) {
                    token = data.token;
                    $('loginOverlay').style.display = 'none';
                    initWebSocket();
                    loadBlock('A');
                } else alert(data.error);
            } catch (err) { alert("Lỗi kết nối Server"); }
        }

        function initWebSocket() {
            ws = new WebSocket(WS_URL);
            ws.onopen = () => {
                ws.send(JSON.stringify({ type: 'HELLO', token, app: 'GNT' }));
                $('wsStatus').className = 'ws-status active';
                $('wsStatus').innerText = 'CONNECTED';
            };
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'EVENT' && data.event) {
                    // Nhận lệnh từ PIMS
                    if (data.event.type === 'GXT_CONFIRMED' || data.event.type === 'YARD_POSITION_ASSIGNED' || data.event.type === 'YARD_RELOCATE_ORDER') {
                        // Gọi API lấy State để show job
                        fetchState(data.event.plate);
                    }
                }
                if (data.type === 'YARD_UPDATE') {
                    yardData = data.yard.blocks;
                    // refresh current block UI
                    const activeTab = document.querySelector('.block-tab.active');
                    if (activeTab) loadBlock(activeTab.innerText.match(/Block ([A-Z])/)[1]);
                }
            };
            ws.onclose = () => {
                $('wsStatus').className = 'ws-status'; $('wsStatus').innerText = 'DISCONNECTED';
                setTimeout(initWebSocket, 3000);
            };
        }

        async function fetchState(plate) {
            const res = await fetch(`${API_BASE}/state/${plate}`);
            const data = await res.json();
            
            if (data.job && data.state && data.state.status !== 'GNT_DONE') {
                currentJob = data.job;
                
                // Fetch container detail
                const cres = await fetch(`${API_BASE}/containers/${currentJob.containerId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const cdata = await cres.json();
                const cont = cdata.ok ? cdata.container : null;

                if (cont && cont.yardPosition) {
                    $('emptyTask').style.display = 'none';
                    $('activeTask').style.display = 'flex';
                    $('activeTask').style.flexDirection = 'column';

                    $('tPlate').innerText = data.plate;
                    $('tContainer').innerText = cont.containerId;
                    $('tSize').innerText = `${cont.size} | ${cont.fullEmpty} | OP: ${cont.operationType}`;
                    $('tLocation').innerText = `${cont.yardPosition.block}-${String(cont.yardPosition.bay).padStart(2,'0')}-${String(cont.yardPosition.row).padStart(2,'0')}-${String(cont.yardPosition.tier).padStart(2,'0')})`;

                    // Open correct block map
                    loadBlock(cont.yardPosition.block);
                }
            } else {
                currentJob = null;
                $('emptyTask').style.display = 'flex';
                $('activeTask').style.display = 'none';
            }
        }

        /* ===== MAP RENDER ===== */
        function loadBlock(blockId) {
            // UI tab update
            document.querySelectorAll('.block-tab').forEach(t => t.className = 'block-tab');
            const tabs = document.querySelectorAll('.block-tab');
            for(let t of tabs) { if(t.innerText.includes(blockId)) t.className = 'block-tab active'; }

            // Render bay
            const wrap = $('bayGrid');
            wrap.innerHTML = '';
            
            const bdata = yardData[blockId];
            if (!bdata || !bdata.bays) return;

            bdata.bays.forEach(bay => {
                let html = `<div class="bay-card"><div class="bay-title"><span>Bay ${String(bay.bay).padStart(2,'0')}</span><span style="color:var(--text-muted);">${bay.pct}%</span></div><div class="tier-grid">`;
                
                // We mock rows/tiers visually based on pct for prototype if no deep data sent yet
                // For a real app, backend sends full array of slots. Here we just colorize based on used slots.
                const filledCells = bay.used;
                const totalCells = bay.total;
                
                for(let r=0; r < bdata.maxRow; r++) {
                    html += `<div class="tier-row">`;
                    for(let t=0; t < bdata.maxTier; t++) {
                        // Check if this is the target of currentJob
                        const isTarget = currentJob && currentJob.yardPosition && currentJob.yardPosition.block === blockId && currentJob.yardPosition.bay === bay.bay;
                        const cellIdx = r * bdata.maxTier + t;
                        const isFilled = cellIdx < filledCells;
                        const cls = isTarget && !isFilled ? "tier-cell target" : (isFilled ? "tier-cell filled" : "tier-cell");
                        html += `<div class="${cls}"></div>`;
                    }
                    html += `</div>`;
                }
                html += `</div></div>`;
                wrap.innerHTML += html;
            });
        }

        /* ===== GNT ACTIONS ===== */
        function confirmTask() {
            if(!currentJob) return;
            ws.send(JSON.stringify({
                type: 'EVENT',
                event: { type: 'GNT_DONE', plate: currentJob.plate }
            }));
            
            $('emptyTask').style.display = 'flex';
            $('activeTask').style.display = 'none';
            alert("Lệnh đã hoàn tất! Đồng bộ PIMS.");
        }

        function reportFull() {
            if (!currentJob) return;
            // Report current Block-Bay as full
            fetch(`${API_BASE}/yard/report-full`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ block: currentJob.yardPosition.block, bay: currentJob.yardPosition.bay })
            }).then(() => {
                alert("Đã báo Cấp điều độ (PIMS) xin điều chỉnh lại khu vực bãi!");
                $('emptyTask').style.display = 'flex';
                $('activeTask').style.display = 'none';
            });
        }

        /* ===== MAP INTERACTION ===== */
        const mapContainer = document.getElementById('mapContainer');
        let currentZoom = 1;

        function zoomMap(delta) {
            currentZoom += delta;
            if(currentZoom < 0.5) currentZoom = 0.5;
            if(currentZoom > 2.5) currentZoom = 2.5;
            $('bayGrid').style.transform = `scale(${currentZoom})`;
        }
        function resetZoom() {
            currentZoom = 1;
            $('bayGrid').style.transform = `scale(1)`;
        }

        // Mouse Drag to Pan
        let isDown = false;
        let startX, startY, scrollLeft, scrollTop;

        mapContainer.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - mapContainer.offsetLeft;
            startY = e.pageY - mapContainer.offsetTop;
            scrollLeft = mapContainer.scrollLeft;
            scrollTop = mapContainer.scrollTop;
        });
        mapContainer.addEventListener('mouseleave', () => isDown = false);
        mapContainer.addEventListener('mouseup', () => isDown = false);
        mapContainer.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - mapContainer.offsetLeft;
            const y = e.pageY - mapContainer.offsetTop;
            const walkX = (x - startX) * 1.5; 
            const walkY = (y - startY) * 1.5;
            mapContainer.scrollLeft = scrollLeft - walkX;
            mapContainer.scrollTop = scrollTop - walkY;
        });

    </script>
</body>
</html>
